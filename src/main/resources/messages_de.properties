# Syntax Errors
error.missingSemicolon=Die Anweisung muss mit einem Semikolon (;) enden.
error.missingParenthesis=Fehlende oder falsch gesetzte Klammer, fehlendes Komma oder fehlendes Schlüsselwort in einem Ausdruck.
error.missingKeyword=Fehlendes oder falsch geschriebenes Schlüsselwort (z.B. AS, FROM, SELECT, WHERE, JOIN, OBJECT, IDENTIFIER).
error.missingSeparator=Fehlendes Komma oder Satzzeichen.
error.missingExpression=Fehlender oder ungültiger Ausdruck.
error.missingWhere=WHERE-Bedingung fehlt oder ist falsch.
error.missingTable=Tabellenname fehlt oder ist ungültig.
error.missingMakeRef=Ein oder mehrere MAKE_REF- oder WHERE-Ausdrücke fehlen oder sind falsch.
error.missingCastForMultiset=CAST(...) fehlt oder ist falsch geschrieben. MULTISET muss innerhalb eines CAST-Ausdrucks stehen.
error.missingObjectIdentifier=Fehlende WITH OBJECT IDENTIFIER-Klausel.
error.from=FROM fehlt oder ist falsch, oder die SELECT-Klausel ist fehlerhaft (fehlendes Komma).
error.tableNotFound=Tabelle oder View existiert nicht.
error.invalidViewName=Ungültiger oder fehlender View-Name.
error.invalidType=Falscher oder unbekannter Objekttyp verwendet.
error.invalidOid=Falscher Object-Identifier verwendet.
error.invalidSuperview=Die View referenziert nicht die korrekte Superview.
error.invalidBooleanLiteral=Ungültiges boolesches Literal. Oracle unterstützt keine direkten Boolean-Werte (true/false) in SQL-Bedingungen.
error.invalidRelationalOperator=Ungültiger oder fehlender Vergleichsoperator in der WHERE-Bedingung.
error.schemaCreationFailed=Schema-Erstellung fehlgeschlagen: {0}

# Level 2 - Error Location
error.location.oid=Fehler in der WITH OBJECT IDENTIFIER-Klausel.
error.location.superview=Fehler in der UNDER-Klausel.
error.location.type=Fehler beim verwendeten Objekttyp.
error.location.castMultiset=Fehler im CAST(MULTISET(...))-Ausdruck.
error.location.castMultisetType=Falscher Typ im CAST(MULTISET(...) AS typ)-Ausdruck.
error.location.makeRef=Fehler in einem oder mehreren MAKE_REF-Ausdrücken.
error.location.constructor=Fehler in einem oder mehreren Objekt-Konstruktoren.
error.location.selectList=Fehler bei der Spaltenanzahl (SELECT-Klausel oder Typ-Definition).
error.location.columns=Fehler in der Spaltenstruktur der View.
error.location.columnCount=Fehler bei der Spaltenanzahl (SELECT-Klausel oder Typ-Definition).
error.location.columnOrder=Fehler in der Spaltenreihenfolge der SELECT-Klausel.
error.location.columnsOrName=Fehler bei der Spaltenanzahl oder einem Spaltennamen (SELECT-Klausel, WHERE-Bedingung, ...).
error.location.invalidColumn=Ungültiger Spaltenname in der SELECT-Klausel.
error.location.whereClause=Fehler in der WHERE-Bedingung.
error.location.rows=Fehler in den Ergebniszeilen (WHERE-Bedingung, JOIN, ...).
error.location.expression=Fehler bei einem Ausdruck (WHERE-Bedingung, SELECT-Klausel oder IDENTIFIER-Klausel).

# Level 3 - Detailed Error Descriptions
error.invalidType.detail=Falscher oder unbekannter Objekttyp verwendet. Prüfen Sie, ob der Typ in der OF-Klausel korrekt geschrieben ist und im Schema existiert.
error.invalidOid.detail=Falscher Object-Identifier verwendet. Prüfen Sie die WITH OBJECT IDENTIFIER-Klausel – die angegebenen Spalten müssen im Schema vorhanden und eindeutig sein.
error.invalidSuperview.detail=Die View referenziert nicht die korrekte Superview. Prüfen Sie die UNDER-Klausel – der angegebene View-Name muss mit der konfigurierten Superview übereinstimmen.
error.invalidCastMultiset.detail=Falscher Typ im CAST(MULTISET(...) AS typ)-Ausdruck. Prüfen Sie, ob der angegebene Typ korrekt geschrieben ist und mit dem erwarteten Collection-Typ übereinstimmt.
error.invalidMakeRef.detail=Ein oder mehrere MAKE_REF-Ausdrücke wurden falsch verwendet. Prüfen Sie, ob der erste Parameter der korrekte View-Name ist und ob der zweite Parameter der Primärschlüssel der referenzierten Tabelle ist.
error.invalidColumnName.detail=Ungültiger oder überflüssiger Spaltenname in der SELECT-Klausel. Prüfen Sie, ob der Spaltenname korrekt geschrieben ist oder ob eine überflüssige Spalte angegeben wurde.
error.invalidColumn.detail=Ungültiger Spaltenname oder Attribut in der SELECT-Klausel oder WHERE-Bedingung. Prüfen Sie, ob der Spaltenname korrekt geschrieben ist und in der referenzierten Tabelle existiert.
error.invalidColumnCount.detail=Die Anzahl der Spalten in der SELECT-Klausel stimmt nicht mit der Typdefinition überein. Prüfen Sie, ob alle Attribute des Objekttyps in der richtigen Anzahl und Reihenfolge angegeben sind.
error.invalidDatatypeComparison.detail=Ungültiger Vergleich von Datentypen in der WHERE-Bedingung. Prüfen Sie, ob die verglichenen Werte kompatible Datentypen haben.
error.missingWhere.detail=WHERE-Bedingung fehlt oder ist falsch aufgebaut. Prüfen Sie, ob die Filterbedingung vollständig und korrekt formuliert ist.
error.missingExpression.detail=Fehlender oder ungültiger Ausdruck. Prüfen Sie, ob nach einem Schlüsselwort wie WHERE, SET oder ON ein gültiger Ausdruck folgt.
error.missingNestedTable.detail=CAST(MULTISET(...))-Ausdruck fehlt vollständig. Prüfen Sie, ob verschachtelte Collections korrekt mit CAST(MULTISET(...) AS typ) definiert sind.
error.missingPrimitiveField.detail=Ein oder mehrere primitive Felder fehlen in der SELECT-Klausel. Prüfen Sie, ob alle Attribute des Objekttyps vollständig und in richtiger Reihenfolge angegeben sind.
error.missingMakeRef.detail=Ein oder mehrere MAKE_REF-Ausdrücke fehlen oder wurden falsch verwendet.
error.missingConstructor.detail=Ein oder mehrere Objekt-Konstruktoren fehlen oder wurden falsch verwendet.
error.tableNotFound.detail=Tabelle oder View existiert nicht im aktuellen Schema. Prüfen Sie Schreibweise und ob das Objekt korrekt angelegt wurde.

