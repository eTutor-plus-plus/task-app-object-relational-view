# Syntax Errors
error.missingSemicolon=The statement must end with a semicolon (;).
error.missingParenthesis=Missing or incorrectly placed parenthesis, missing comma or missing keyword in an expression.
error.missingKeyword=Missing or misspelled keyword (e.g. AS, FROM, SELECT, WHERE, JOIN, OBJECT, IDENTIFIER).
error.missingSeparator=Missing comma or punctuation.
error.missingExpression=Missing or invalid expression.
error.missingWhere=WHERE condition is missing or incorrect.
error.missingTable=Table name is missing or invalid.
error.missingMakeRef=One or more MAKE_REF or WHERE expressions are missing or incorrect.
error.missingCastForMultiset=CAST(...) is missing or misspelled. MULTISET must be used inside a CAST expression.
error.missingObjectIdentifier=Missing WITH OBJECT IDENTIFIER clause.
error.from=FROM is missing or incorrect, or the SELECT clause is malformed (missing comma).
error.tableNotFound=Table or view does not exist.
error.invalidViewName=Invalid or missing view name.
error.invalidType=Invalid or unknown object type used.
error.invalidOid=Wrong object identifier used.
error.invalidSuperview=The view does not reference the correct superview.
error.invalidBooleanLiteral=Invalid boolean literal. Oracle does not support direct boolean values (true/false) in SQL conditions.
error.invalidRelationalOperator=Invalid or missing relational operator in the WHERE condition.
error.schemaCreationFailed=Schema creation failed: {0}

# Level 2 - Error Location
error.location.oid=Error in the WITH OBJECT IDENTIFIER clause.
error.location.superview=Error in the UNDER clause.
error.location.type=Error in the used object type.
error.location.castMultiset=Error in the CAST(MULTISET(...)) expression.
error.location.castMultisetType=Invalid type in the CAST(MULTISET(...) AS type) expression.
error.location.makeRef=Error in one or more MAKE_REF expressions.
error.location.constructor=Error in one or more object constructors.
error.location.selectList=Error in the column count (SELECT clause or type definition).
error.location.columns=Error in the column structure of the view.
error.location.columnCount=Error in the column count (SELECT clause or type definition).
error.location.columnOrder=Error in the column order of the SELECT clause.
error.location.columnsOrName=Error in the column count or a column name (SELECT clause, WHERE condition, ...).
error.location.invalidColumn=Invalid column name in the SELECT clause.
error.location.whereClause=Error in the WHERE condition.
error.location.rows=Error in the result rows (WHERE condition, JOIN, ...).
error.location.expression=Error in an expression (WHERE condition, SELECT clause or IDENTIFIER clause).

# Level 3 - Detailed Error Descriptions
error.invalidType.detail=Invalid or unknown object type used. Check whether the type in the OF clause is spelled correctly and exists in the schema.
error.invalidOid.detail=Wrong object identifier used. Check the WITH OBJECT IDENTIFIER clause – the specified columns must exist in the schema and be unique.
error.invalidSuperview.detail=The view does not reference the correct superview. Check the UNDER clause – the specified view name must match the configured superview.
error.invalidCastMultiset.detail=Invalid type in the CAST(MULTISET(...) AS type) expression. Check whether the specified type is spelled correctly and matches the expected collection type.
error.invalidMakeRef.detail=One or more MAKE_REF expressions were used incorrectly. Check whether the first parameter is the correct view name and whether the second parameter is the primary key of the referenced table.
error.invalidColumnName.detail=Invalid or extraneous column name in the SELECT clause. Check whether the column name is spelled correctly or whether an extraneous column was specified.
error.invalidColumnCount.detail=The number of columns in the SELECT clause does not match the type definition. Check whether all attributes of the object type are specified in the correct number and order.
error.invalidDatatypeComparison.detail=Invalid comparison of data types in the WHERE condition. Check whether the compared values have compatible data types.
error.missingWhere.detail=WHERE condition is missing or structurally incorrect. Check whether the filter condition is complete and correctly formulated.
error.missingExpression.detail=Missing or invalid expression. Check whether a valid expression follows a keyword such as WHERE, SET or ON.
error.missingNestedTable.detail=CAST(MULTISET(...)) expression is missing entirely. Check whether nested collections are correctly defined with CAST(MULTISET(...) AS type).
error.missingPrimitiveField.detail=One or more primitive fields are missing in the SELECT clause. Check whether all attributes of the object type are fully specified and in the correct order.
error.missingMakeRef.detail=One or more MAKE_REF expressions are missing or were used incorrectly.
error.missingConstructor.detail=One or more object constructors are missing or were used incorrectly.
error.tableNotFound.detail=Table or view does not exist in the current schema. Check the spelling and whether the object was created correctly.
error.ambiguousColumn.detail=A column name is ambiguous. Use a table alias when the column exists in multiple tables.

