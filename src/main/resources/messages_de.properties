# General Details
syntax.valid=Gültige Syntax.
syntax.error=Syntaxfehler.
structure.error=Strukturfehler.
structure.error.detail=Die Spaltenstruktur der View stimmt nicht mit der Erwartung überein. Prüfen Sie Anzahl, Namen und Reihenfolge der Spalten in der SELECT-Klausel.
content.error=Inhaltsfehler.
content.error.detail=Die Ergebniszeilen stimmen nicht mit der Referenzlösung überein. Prüfen Sie WHERE-Bedingungen, JOIN-Verknüpfungen und verschachtelte MULTISET-Ausdrücke.
